<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400">
  <!-- Sky background -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1000" height="400" fill="url(#sky)"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="50" rx="60" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="210" cy="60" rx="50" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="850" cy="80" rx="70" ry="35" fill="white" opacity="0.7"/>
  
  <!-- Sun -->
  <circle cx="900" cy="60" r="40" fill="#ffd700"/>
  
  <!-- Building/House -->
  <rect x="100" y="200" width="300" height="200" fill="#d2691e" stroke="#8b4513" stroke-width="3"/>
  <!-- Roof -->
  <polygon points="100,200 250,80 400,200" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <!-- Window 1 -->
  <rect x="140" y="140" width="50" height="50" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <!-- Window 2 -->
  <rect x="220" y="140" width="50" height="50" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <!-- Door -->
  <rect x="210" y="280" width="80" height="120" fill="#654321" stroke="#333" stroke-width="2"/>
  <!-- Door handle -->
  <circle cx="270" cy="340" r="5" fill="#ffd700"/>
  
  <!-- Scaffold -->
  <rect x="420" y="150" width="20" height="250" fill="#666" stroke="#333" stroke-width="1"/>
  <rect x="420" y="150" width="150" height="15" fill="#888" stroke="#333" stroke-width="1"/>
  <rect x="420" y="200" width="150" height="15" fill="#888" stroke="#333" stroke-width="1"/>
  <rect x="420" y="250" width="150" height="15" fill="#888" stroke="#333" stroke-width="1"/>
  
  <!-- Solar Panels on Roof -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="100" height="60" fill="#0066cc" stroke="#004a99" stroke-width="2"/>
    <line x1="33" y1="0" x2="33" y2="60" stroke="#004a99" stroke-width="1" opacity="0.5"/>
    <line x1="66" y1="0" x2="66" y2="60" stroke="#004a99" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="20" x2="100" y2="20" stroke="#004a99" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="320" width="1000" height="80" fill="#8b7355"/>
  <!-- Grass -->
  <rect x="0" y="350" width="1000" height="50" fill="#228b22"/>
  
  <!-- Worker figure -->
  <g transform="translate(600, 260)">
    <!-- Head -->
    <circle cx="0" cy="-15" r="15" fill="#d4a574"/>
    <!-- Body -->
    <rect x="-12" y="0" width="24" height="35" fill="#0066ff"/>
    <!-- Arms -->
    <rect x="-35" y="5" width="25" height="10" fill="#d4a574" rx="5"/>
    <rect x="10" y="5" width="25" height="10" fill="#d4a574" rx="5"/>
    <!-- Legs -->
    <rect x="-8" y="35" width="8" height="30" fill="#333"/>
    <rect x="0" y="35" width="8" height="30" fill="#333"/>
  </g>
  
  <!-- Text -->
  <text x="500" y="390" font-size="20" fill="#1a3a52" text-anchor="middle" font-weight="bold">Professional Solar Installation Services</text>
</svg>