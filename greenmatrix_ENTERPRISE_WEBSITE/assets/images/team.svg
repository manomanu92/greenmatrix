<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300">
  <!-- Background -->
  <defs>
    <linearGradient id="teamBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0e8f2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1000" height="300" fill="url(#teamBg)"/>
  
  <!-- Person 1 -->
  <g transform="translate(150, 80)">
    <!-- Head -->
    <circle cx="0" cy="-20" r="25" fill="#d4a574"/>
    <!-- Body -->
    <rect x="-20" y="10" width="40" height="50" fill="#0066ff" rx="5"/>
    <!-- Arms -->
    <rect x="-45" y="20" width="25" height="15" fill="#d4a574" rx="7"/>
    <rect x="20" y="20" width="25" height="15" fill="#d4a574" rx="7"/>
    <!-- Smile -->
    <path d="M -8 -15 Q 0 -10 8 -15" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Person 2 -->
  <g transform="translate(500, 80)">
    <!-- Head -->
    <circle cx="0" cy="-20" r="25" fill="#c9946f"/>
    <!-- Body -->
    <rect x="-20" y="10" width="40" height="50" fill="#00d4ff" rx="5"/>
    <!-- Arms -->
    <rect x="-45" y="20" width="25" height="15" fill="#c9946f" rx="7"/>
    <rect x="20" y="20" width="25" height="15" fill="#c9946f" rx="7"/>
  </g>
  
  <!-- Person 3 -->
  <g transform="translate(850, 80)">
    <!-- Head -->
    <circle cx="0" cy="-20" r="25" fill="#daa583"/>
    <!-- Body -->
    <rect x="-20" y="10" width="40" height="50" fill="#0066ff" rx="5"/>
    <!-- Arms -->
    <rect x="-45" y="20" width="25" height="15" fill="#daa583" rx="7"/>
    <rect x="20" y="20" width="25" height="15" fill="#daa583" rx="7"/>
  </g>
  
  <!-- Labels -->
  <text x="150" y="190" font-size="16" fill="#1a3a52" text-anchor="middle" font-weight="bold">Expert Engineers</text>
  <text x="500" y="190" font-size="16" fill="#1a3a52" text-anchor="middle" font-weight="bold">Professional Team</text>
  <text x="850" y="190" font-size="16" fill="#1a3a52" text-anchor="middle" font-weight="bold">Dedicated Support</text>
</svg>