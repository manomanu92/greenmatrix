<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cable -->
  <path d="M 30 80 Q 50 60, 70 50 Q 90 40, 110 50 Q 130 60, 150 80" stroke="#ff6600" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Connectors -->
  <circle cx="30" cy="80" r="8" fill="#333" stroke="#666" stroke-width="2"/>
  <circle cx="150" cy="80" r="8" fill="#333" stroke="#666" stroke-width="2"/>
  <!-- Breaker box -->
  <rect x="50" y="110" width="100" height="70" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <!-- Breakers -->
  <rect x="65" y="125" width="12" height="25" fill="#ff0000" stroke="#333" stroke-width="1"/>
  <rect x="85" y="125" width="12" height="25" fill="#ff0000" stroke="#333" stroke-width="1"/>
  <rect x="105" y="125" width="12" height="25" fill="#ff0000" stroke="#333" stroke-width="1"/>
  <!-- Ground symbol -->
  <line x1="100" y1="160" x2="100" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="90" y1="175" x2="110" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="95" y1="180" x2="105" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="185" x2="100" y2="190" stroke="#333" stroke-width="2"/>
</svg>