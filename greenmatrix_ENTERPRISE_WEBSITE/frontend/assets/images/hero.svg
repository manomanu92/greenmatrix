<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="1000" cy="80" r="60" fill="#ffd700"/>
  <circle cx="1000" cy="80" r="50" fill="#ffed4e"/>
  
  <!-- Sun rays -->
  <line x1="1000" y1="10" x2="1000" y2="0" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <line x1="1000" y1="160" x2="1000" y2="170" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <line x1="1070" y1="80" x2="1080" y2="80" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <line x1="930" y1="80" x2="920" y2="80" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Solar panels on roof -->
  <!-- Panel 1 -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="120" height="80" fill="#0066cc" stroke="#004a99" stroke-width="2" transform="skewY(-15)"/>
    <line x1="40" y1="0" x2="50" y2="80" stroke="#004a99" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="0" x2="90" y2="80" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Panel 2 -->
  <g transform="translate(300, 180)">
    <rect x="0" y="0" width="120" height="80" fill="#0066cc" stroke="#004a99" stroke-width="2" transform="skewY(-15)"/>
    <line x1="40" y1="0" x2="50" y2="80" stroke="#004a99" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="0" x2="90" y2="80" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Panel 3 -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="120" height="80" fill="#0066cc" stroke="#004a99" stroke-width="2" transform="skewY(-15)"/>
    <line x1="40" y1="0" x2="50" y2="80" stroke="#004a99" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="0" x2="90" y2="80" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Roof -->
  <polygon points="50,280 1150,280 1150,400 50,400" fill="#d2691e"/>
  
  <!-- Grid/field lines -->
  <line x1="50" y1="340" x2="1150" y2="340" stroke="#8b6914" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="370" x2="1150" y2="370" stroke="#8b6914" stroke-width="2" opacity="0.5"/>
</svg>