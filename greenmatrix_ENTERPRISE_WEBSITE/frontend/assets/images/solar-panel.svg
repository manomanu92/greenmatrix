<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Solar Panel -->
  <rect x="40" y="50" width="120" height="100" fill="#0066cc" stroke="#004a99" stroke-width="2"/>
  <!-- Panel cells -->
  <line x1="70" y1="50" x2="70" y2="150" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="50" x2="130" y2="150" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="75" x2="160" y2="75" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="125" x2="160" y2="125" stroke="#004a99" stroke-width="1" opacity="0.5"/>
  <!-- Frame -->
  <rect x="30" y="40" width="140" height="120" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Sun rays -->
  <circle cx="170" cy="40" r="15" fill="#ffd700"/>
  <line x1="170" y1="20" x2="170" y2="10" stroke="#ffd700" stroke-width="2"/>
  <line x1="170" y1="60" x2="170" y2="70" stroke="#ffd700" stroke-width="2"/>
  <line x1="150" y1="40" x2="140" y2="40" stroke="#ffd700" stroke-width="2"/>
  <line x1="190" y1="40" x2="200" y2="40" stroke="#ffd700" stroke-width="2"/>
</svg>