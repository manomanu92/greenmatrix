<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Inverter Box -->
  <rect x="40" y="40" width="120" height="130" fill="#2d2d2d" stroke="#333" stroke-width="2"/>
  <!-- Display screen -->
  <rect x="55" y="55" width="90" height="50" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <text x="100" y="90" font-size="24" fill="#00ff00" text-anchor="middle" font-family="monospace">5kW</text>
  <!-- LED indicators -->
  <circle cx="60" cy="120" r="5" fill="#ff0000"/>
  <circle cx="75" cy="120" r="5" fill="#ffaa00"/>
  <circle cx="90" cy="120" r="5" fill="#00ff00"/>
  <circle cx="105" cy="120" r="5" fill="#00ff00"/>
  <circle cx="120" cy="120" r="5" fill="#00ff00"/>
  <circle cx="135" cy="120" r="5" fill="#00ff00"/>
  <!-- Control knob -->
  <circle cx="65" cy="145" r="8" fill="#444" stroke="#666" stroke-width="1"/>
  <line x1="65" y1="137" x2="65" y2="130" stroke="#666" stroke-width="2"/>
  <!-- Port connectors -->
  <rect x="100" y="160" width="60" height="8" fill="#888" stroke="#555" stroke-width="1"/>
  <circle cx="110" cy="164" r="2" fill="#333"/>
  <circle cx="130" cy="164" r="2" fill="#333"/>
  <circle cx="150" cy="164" r="2" fill="#333"/>
</svg>